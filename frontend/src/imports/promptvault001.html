<style>
  :root {
    --bg-page:        #ECE6F5;
    --bg-window:      #FFFFFF;
    --bg-chrome:      #F4F1F8;
    --bg-card:        #FFFFFF;
    --bg-hover:       #F5F3F8;
    --text-primary:   #0F0F12;
    --text-secondary: #5C5C66;
    --text-muted:     #9A9AA3;
    --border-soft:    #ECEAF1;
    --border-input:   #E2E0E8;
    --accent-purple:  #5E20E0;
    --accent-yellow:  #FFD60A;
    --accent-yellow-h:#FFC700;
    --accent-red:     #E63946;
    --shadow-card:    0 18px 40px -16px rgba(20, 12, 50, 0.22), 0 4px 10px rgba(20, 12, 50, 0.06);
    --shadow-button:  0 1px 2px rgba(20, 12, 50, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 32px;
  }

  /* ---------- Header ---------- */
  .page-header {
    text-align: center;
    margin-bottom: 28px;
    max-width: 760px;
  }
  .page-header h1 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 10px 0;
    color: var(--text-primary);
  }
  .page-header h1 .accent { color: var(--accent-purple); }
  .page-header p {
    font-size: clamp(14px, 1.4vw, 17px);
    color: var(--text-secondary);
    margin: 0;
    font-weight: 500;
  }

    display: flex;
    justify-content: center;

    border-radius: 14px;

  /* Warped screen surface */
  .screen-projection {
    position: absolute;
    transform-origin: 0 0;
    will-change: transform;
    container-type: inline-size;
    container-name: screen;
  }
  .screen-canvas {
    width: 100%; height: 100%;
    background: #FFFFFF;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Browser chrome */
  .chrome {
    flex: 0 0 auto;
    height: 6.5%;
    background: var(--bg-chrome);
    display: flex;
    align-items: center;
    padding: 0 1.4%;
    border-bottom: 1px solid var(--border-soft);
    gap: 1.4%;
    min-height: 32px;
  }
  .traffic { display: flex; gap: 0.6cqw; }
  .traffic span { width: 1.05cqw; height: 1.05cqw; min-width: 8px; min-height: 8px; border-radius: 50%; }
  .traffic .r { background: #FF5F57; }
  .traffic .y { background: #FEBC2E; }
  .traffic .g { background: #28C840; }
  .url-bar { flex: 1; display: flex; justify-content: center; }
  .url {
    background: #FFFFFF;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    padding: 0.45cqw 1.4cqw 0.45cqw 1cqw;
    font-size: 1.1cqw;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 0.5cqw;
    min-width: 24%;
    justify-content: center;
    font-weight: 500;
    white-space: nowrap;
  }
  .url .star { color: var(--accent-red); line-height: 1; }
  .url .domain { color: var(--text-primary); font-weight: 600; }
  .url .slash { color: var(--text-muted); }
  .dots { display: flex; gap: 0.5cqw; }
  .dots span { width: 0.95cqw; height: 0.95cqw; min-width: 7px; min-height: 7px; border-radius: 50%; }
  .dots .a { background: #4285F4; }
  .dots .b { background: #FBBC05; }
  .dots .c { background: #EA4335; }

  /* Body inside screen */
  .body {
    flex: 1;
    display: grid;
    grid-template-columns: 36% 1fr;
    grid-template-rows: 1fr auto;
    min-height: 0;
  }
  .left {
    grid-row: 1; grid-column: 1;
    padding: 3% 2.5% 0 2.5%;
    background: #FFFFFF;
    display: flex;
    flex-direction: column;
  }
  .label {
    font-size: 1.05cqw;
    letter-spacing: 0.18em;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4%;
  }

  /* Prompt card — sits inside .left, slightly oversized and shifted left */
  .prompt-card {
    background: var(--bg-card);
    border: 1px solid var(--border-soft);
    border-radius: 1.4cqw;
    padding: 2.2cqw 2.4cqw 2.4cqw 2.4cqw;
    box-shadow: var(--shadow-card);
    /* Width slightly wider than .left's content width, then nudged left to overlap left edge */
    width: 108%;
    margin-left: -8%;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.25s ease;
  }
  .prompt-card.flash {
    transform: scale(1.025);
    box-shadow:
      0 24px 50px -16px rgba(94, 32, 224, 0.35),
      0 0 0 2px rgba(94, 32, 224, 0.18),
      0 4px 12px rgba(20, 12, 50, 0.1);
  }
  .quote-open, .quote-close {
    font-family: 'Instrument Serif', serif;
    font-size: 4.5cqw;
    color: var(--text-primary);
    line-height: 0.5;
  }
  .quote-open { display: block; margin-bottom: 1.2cqw; }
  .quote-close { display: block; text-align: right; margin-top: 0.5cqw; }
  .prompt-text {
    width: 100%;
    border: none; outline: none; resize: none;
    font-family: inherit;
    font-size: 1.55cqw;
    line-height: 1.45;
    font-weight: 600;
    color: var(--text-primary);
    background: transparent;
    padding: 0;
    overflow: hidden;
    transition: opacity 0.18s ease;
  }

  .actions {
    display: flex;
    gap: 0.9cqw;
    margin-top: 2cqw;
  }
  .btn {
    border: none;
    border-radius: 0.85cqw;
    padding: 1cqw 2cqw;
    font-family: inherit;
    font-size: 1.3cqw;
    font-weight: 600;
    display: inline-flex;
    align-items: center;
    gap: 0.6cqw;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.15s ease;
    box-shadow: var(--shadow-button);
    white-space: nowrap;
  }
  .btn:active { transform: translateY(1px); }
  .btn-run { background: var(--accent-yellow); color: #0F0F12; }
  .btn-run:hover { background: var(--accent-yellow-h); }
  .btn-run:disabled { opacity: 0.7; cursor: not-allowed; }
  .btn-copy { background: #FFF; color: var(--text-primary); border: 1px solid var(--border-input); }
  .btn-copy:hover { background: var(--bg-hover); }
  .btn-copy.copied { background: #E8F5EC; color: #0F7B3F; border-color: #BFE3CB; }
  .btn svg { width: 1.3cqw; height: 1.3cqw; min-width: 11px; min-height: 11px; }

  /* Right side — preview */
  .right {
    grid-row: 1; grid-column: 2;
    padding: 3% 3% 0 0;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .preview {
    position: relative;
    flex: 1;
    border-radius: 14px;
    overflow: hidden;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .preview > * { animation: previewFadeIn 0.25s ease; }
  @keyframes previewFadeIn {
    from { opacity: 0; transform: scale(1.02); }
    to   { opacity: 1; transform: scale(1); }
  }
  .preview-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .preview-badge {
    position: absolute;
    bottom: 4%; left: 3%;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #FFF;
    padding: 0.55cqw 1.1cqw 0.55cqw 0.9cqw;
    border-radius: 999px;
    font-size: 1cqw;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 0.4cqw;
  }
  .preview-badge::before {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 0.35cqw 0 0.35cqw 0.55cqw;
    border-color: transparent transparent transparent #FFFFFF;
  }
  .preview-text-output {
    color: #E8E8EE;
    padding: 4% 4.5%;
    font-size: 1.2cqw;
    line-height: 1.7;
    width: 100%; height: 100%;
    overflow-y: auto;
    box-sizing: border-box;
  }
  .preview-code-output {
    color: #C8E1FF;
    padding: 3.5% 4%;
    font-size: 1.1cqw;
    line-height: 1.65;
    width: 100%; height: 100%;
    overflow-y: auto;
    font-family: 'SF Mono', Menlo, Monaco, Consolas, monospace;
    white-space: pre-wrap;
    box-sizing: border-box;
  }
  .spinner {
    width: 4cqw; height: 4cqw;
    border: 0.3cqw solid rgba(255,255,255,0.15);
    border-top-color: #FFFFFF;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs {
    grid-row: 2; grid-column: 1 / -1;
    display: flex;
    gap: 0.6cqw;
    justify-content: center;
    padding: 1.5% 3% 1.8% 3%;
    border-top: 1px solid var(--border-soft);
    background: #FFFFFF;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 0.9cqw 1.2cqw 1.1cqw 1.2cqw;
    font-family: inherit;
    font-size: 1.2cqw;
    font-weight: 500;
    color: var(--text-secondary);
    display: inline-flex;
    align-items: center;
    gap: 0.55cqw;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s ease, border-color 0.15s ease;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active {
    color: var(--text-primary);
    border-bottom-color: var(--accent-red);
    font-weight: 600;
  }
  .tab svg { width: 1.3cqw; height: 1.3cqw; min-width: 12px; min-height: 12px; flex-shrink: 0; }

  /* Toast */
  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #0F0F12; color: #FFFFFF;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mobile fallback */
  @media (max-width: 760px) {
    .page { padding: 32px 16px 24px; }
    .page-header { margin-bottom: 20px; }
    .scene {
      background-image: none;
      box-shadow: none;
      background: var(--bg-page);
      aspect-ratio: auto;
    }
    .screen-projection {
      position: relative !important;
      left: 0 !important; top: 0 !important;
      width: 100% !important; height: auto !important;
      transform: none !important;
    }
    .screen-canvas {
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(20,12,50,0.12);
    }
    .body { grid-template-columns: 1fr; }
    .body .left { grid-column: 1; padding: 24px; }
    .body .right { grid-column: 1; padding: 0 24px; }
    .preview { aspect-ratio: 16 / 10; }
    .prompt-card { width: auto; margin-left: 0; padding: 22px 24px 24px; border-radius: 14px; }
    .quote-open, .quote-close { font-size: 48px; }
    .prompt-text { font-size: 17px; }
    .btn { font-size: 14px; padding: 11px 20px; border-radius: 10px; gap: 8px; }
    .btn svg { width: 14px; height: 14px; }
    .actions { gap: 10px; margin-top: 20px; }
    .label { font-size: 11px; margin-bottom: 16px; }
    .url { font-size: 13px; padding: 6px 14px 6px 12px; }
    .traffic span, .dots span { width: 11px; height: 11px; }
    .tab { font-size: 14px; padding: 10px 14px; gap: 8px; }
    .tab svg { width: 16px; height: 16px; }
    .preview-text-output { font-size: 14px; padding: 28px; }
    .preview-code-output { font-size: 13px; padding: 28px; }
    .preview-badge { font-size: 12px; padding: 6px 12px 6px 10px; }
    .preview-badge::before { border-width: 4px 0 4px 6px; }
    .tabs { overflow-x: auto; padding: 12px 16px; justify-content: flex-start; }
    .tab { flex-shrink: 0; }
    .spinner { width: 32px; height: 32px; border-width: 3px; }
  }
</style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>See how <span class="accent">prompts</span> become <span class="accent">products.</span></h1>
      <p>Pick a discipline &mdash; we&rsquo;ll run a real prompt through it.</p>
    </header>

    <div class="stage">
      <div class="scene" id="scene">
        <div class="screen-projection" id="projection">
          <div class="screen-canvas">
            <div class="chrome">
              <div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div>
              <div class="url-bar">
                <div class="url">
                  <span class="domain">promptvault.app</span>
                  <span class="slash">/</span>
                  <span id="urlPath">image</span>
                </div>
              </div>
              <div class="dots"><span class="a"></span><span class="b"></span><span class="c"></span></div>
            </div>

            <div class="body">
              <div class="left">
                <div class="label">PROMPT</div>
                <div class="prompt-card" id="promptCard">
                  <span class="quote-open">&ldquo;</span>
                  <textarea class="prompt-text" id="promptInput" rows="3" spellcheck="false">A cinematic event poster, dramatic rim lighting, bold typography &mdash; ar 2:3</textarea>
                  <span class="quote-close">&rdquo;</span>
                </div>
                <div class="actions">
                  <button class="btn btn-run" id="runBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <span id="runLabel">Run</span>
                  </button>
                  <button class="btn btn-copy" id="copyBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <span id="copyLabel">Copy</span>
                  </button>
                </div>
              </div>

              <div class="right">
                <div class="preview" id="preview">
                  <img class="preview-img" src="https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=1200&amp;q=80" alt="Preview" />
                  <div class="preview-badge">Playing preview</div>
                </div>
              </div>

              <div class="tabs" id="tabs">
                <button class="tab active" data-tab="image">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>Image
                </button>
                <button class="tab" data-tab="video">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>Video
                </button>
                <button class="tab" data-tab="text">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>Text
                </button>
                <button class="tab" data-tab="content">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>Content
                </button>
                <button class="tab" data-tab="code">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>Code
                </button>
                <button class="tab" data-tab="compare">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="18" rx="1"/></svg>Compare
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copied to clipboard</div>

<script>
  /* RUNTIME PROJECTION */
  const QUAD = {
    tl: [0.1472, 0.1191],
    tr: [0.8150, 0.1572],
    bl: [0.2176, 0.8799],
    br: [0.9068, 0.8154]
  };
  function gaussSolve(A, b) {
    const n = A.length;
    const M = A.map((r, i) => [...r, b[i]]);
    for (let k = 0; k < n; k++) {
      let mx = Math.abs(M[k][k]), p = k;
      for (let i = k + 1; i < n; i++) if (Math.abs(M[i][k]) > mx) { mx = Math.abs(M[i][k]); p = i; }
      if (p !== k) [M[k], M[p]] = [M[p], M[k]];
      for (let i = k + 1; i < n; i++) {
        const f = M[i][k] / M[k][k];
        for (let j = k; j <= n; j++) M[i][j] -= f * M[k][j];
      }
    }
    const x = new Array(n);
    for (let i = n - 1; i >= 0; i--) {
      let s = M[i][n];
      for (let j = i + 1; j < n; j++) s -= M[i][j] * x[j];
      x[i] = s / M[i][i];
    }
    return x;
  }
  function homography(src, dst) {
    const A = [], b = [];
    for (let i = 0; i < 4; i++) {
      const [x, y] = src[i], [X, Y] = dst[i];
      A.push([x, y, 1, 0, 0, 0, -x*X, -y*X]);
      A.push([0, 0, 0, x, y, 1, -x*Y, -y*Y]);
      b.push(X); b.push(Y);
    }
    const h = gaussSolve(A, b);
    return [h[0], h[1], h[2], h[3], h[4], h[5], h[6], h[7], 1];
  }
  function toMatrix3d(H) {
    const [a, c, e, b, d, f, g, h, i] = H;
    return [a, b, 0, g,  c, d, 0, h,  0, 0, 1, 0,  e, f, 0, i];
  }

  const scene = document.getElementById('scene');
  const projection = document.getElementById('projection');

  function updateProjection() {
    if (window.matchMedia('(max-width: 760px)').matches) {
      projection.style.cssText = '';
      return;
    }
    const W = scene.clientWidth, H = scene.clientHeight;
    if (!W || !H) return;
    const tl = [QUAD.tl[0]*W, QUAD.tl[1]*H];
    const tr = [QUAD.tr[0]*W, QUAD.tr[1]*H];
    const bl = [QUAD.bl[0]*W, QUAD.bl[1]*H];
    const br = [QUAD.br[0]*W, QUAD.br[1]*H];
    const xMin = Math.min(tl[0], tr[0], bl[0], br[0]);
    const yMin = Math.min(tl[1], tr[1], bl[1], br[1]);
    const xMax = Math.max(tl[0], tr[0], bl[0], br[0]);
    const yMax = Math.max(tl[1], tr[1], bl[1], br[1]);
    const bw = xMax - xMin, bh = yMax - yMin;
    projection.style.left = xMin + 'px';
    projection.style.top = yMin + 'px';
    projection.style.width = bw + 'px';
    projection.style.height = bh + 'px';
    const src = [[0, 0], [bw, 0], [0, bh], [bw, bh]];
    const dst = [
      [tl[0] - xMin, tl[1] - yMin],
      [tr[0] - xMin, tr[1] - yMin],
      [bl[0] - xMin, bl[1] - yMin],
      [br[0] - xMin, br[1] - yMin]
    ];
    const Hm = homography(src, dst);
    const m = toMatrix3d(Hm);
    projection.style.transform = 'matrix3d(' + m.map(v => v.toFixed(8)).join(',') + ')';
    projection.style.transformOrigin = '0 0';
  }

  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(updateProjection).observe(scene);
  }
  window.addEventListener('resize', updateProjection);
  window.addEventListener('load', updateProjection);
  document.addEventListener('DOMContentLoaded', updateProjection);
  requestAnimationFrame(updateProjection);
  setTimeout(updateProjection, 100);
  setTimeout(updateProjection, 500);

  /* UI */
  const TAB_DATA = {
    image: {
      url: 'image',
      prompt: 'A cinematic event poster, dramatic rim lighting, bold typography \u2014 ar 2:3',
      type: 'image',
      src: 'https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=1200&q=80',
      badge: 'Playing preview'
    },
    video: {
      url: 'video',
      prompt: 'A 5-second cinematic loop of a stadium crowd at golden hour, slow motion, lens flare \u2014 24fps, ar 16:9',
      type: 'image',
      src: 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=1200&q=80',
      badge: 'Playing preview'
    },
    text: {
      url: 'text',
      prompt: 'Write a launch announcement for a sold-out festival \u2014 punchy, cinematic, under 80 words',
      type: 'text',
      content: '<strong style="color:#fff; font-size:1.4cqw; display:block; margin-bottom:3%;">Generated copy</strong><p style="margin:0 0 3% 0;">Under a sky split open by sound, ten thousand voices became one. The lights weren\'t a show \u2014 they were a verdict.</p><p style="margin:0 0 3% 0;">Confetti fell like punctuation on a sentence the night had been writing for hours.</p><p style="margin:0; opacity:0.7;">\u2014 3 variations generated &middot; cinematic tone &middot; 64 words</p>'
    },
    content: {
      url: 'content',
      prompt: 'Generate a campaign brief for a festival poster \u2014 headline, subhead, CTA, tone, format',
      type: 'text',
      content: '<strong style="color:#fff; font-size:1.4cqw; display:block; margin-bottom:3%;">Content brief</strong><p style="margin:0 0 2% 0;"><strong style="color:#fff;">Headline:</strong> The Night Was Always Going To Be This Loud</p><p style="margin:0 0 2% 0;"><strong style="color:#fff;">Subhead:</strong> One stage. Ten thousand reasons.</p><p style="margin:0 0 2% 0;"><strong style="color:#fff;">CTA:</strong> Get tickets before the lights go up</p><p style="margin:0 0 2% 0;"><strong style="color:#fff;">Tone:</strong> Cinematic, urgent, communal</p><p style="margin:0; opacity:0.7;"><strong style="color:#fff;">Format:</strong> 2:3 poster &middot; social cut-down available</p>'
    },
    code: {
      url: 'code',
      prompt: 'Generate the API call to create this prompt programmatically \u2014 JSON schema + fetch example',
      type: 'code',
      content: '// Generated prompt schema\n{\n  "prompt": "A cinematic event poster, dramatic rim lighting",\n  "params": {\n    "aspect_ratio": "2:3",\n    "style": "cinematic",\n    "lighting": "rim",\n    "typography": "bold-display"\n  },\n  "model": "image-v3",\n  "seed": 4821\n}\n\n// API call\nfetch("https://api.promptvault.app/v1/generate", {\n  method: "POST",\n  headers: { "Content-Type": "application/json" },\n  body: JSON.stringify(payload)\n});'
    },
    compare: {
      url: 'compare',
      prompt: 'Compare two poster variations \u2014 one warm orange, one cool blue \u2014 ar 2:3, side by side',
      type: 'image',
      src: 'https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=1200&q=80',
      badge: 'A / B preview'
    }
  };

  const tabs = document.querySelectorAll('.tab');
  const tabsEl = document.getElementById('tabs');
  const preview = document.getElementById('preview');
  const urlPath = document.getElementById('urlPath');
  const promptInput = document.getElementById('promptInput');
  const runBtn = document.getElementById('runBtn');
  const runLabel = document.getElementById('runLabel');
  const copyBtn = document.getElementById('copyBtn');
  const copyLabel = document.getElementById('copyLabel');
  const toast = document.getElementById('toast');
  const promptCard = document.getElementById('promptCard');

  let activeTab = 'image';
  let hoveredTab = 'image';

  function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }
  promptInput.addEventListener('input', () => {
    TAB_DATA[activeTab].prompt = promptInput.value;
    autoGrow(promptInput);
  });
  window.addEventListener('load', () => autoGrow(promptInput));
  window.addEventListener('resize', () => autoGrow(promptInput));

  function renderTab(name) {
    const cfg = TAB_DATA[name];
    if (!cfg) return;
    urlPath.textContent = cfg.url;
    promptInput.value = cfg.prompt;
    autoGrow(promptInput);
    preview.innerHTML = '';
    if (cfg.type === 'image') {
      const img = document.createElement('img');
      img.className = 'preview-img';
      img.src = cfg.src;
      preview.appendChild(img);
      const b = document.createElement('div');
      b.className = 'preview-badge';
      b.textContent = cfg.badge;
      preview.appendChild(b);
    } else if (cfg.type === 'text') {
      const div = document.createElement('div');
      div.className = 'preview-text-output';
      div.innerHTML = cfg.content;
      preview.appendChild(div);
    } else if (cfg.type === 'code') {
      const pre = document.createElement('pre');
      pre.className = 'preview-code-output';
      pre.textContent = cfg.content;
      preview.appendChild(pre);
    }
  }

  let flashTimer;
  function flashCard() {
    promptCard.classList.remove('flash');
    void promptCard.offsetWidth;
    promptCard.classList.add('flash');
    clearTimeout(flashTimer);
    flashTimer = setTimeout(() => promptCard.classList.remove('flash'), 320);
  }

  tabs.forEach(tab => {
    const handler = () => {
      const t = tab.dataset.tab;
      if (t === hoveredTab) return;
      hoveredTab = t;
      renderTab(t);
      flashCard();
    };
    tab.addEventListener('mouseenter', handler);
    tab.addEventListener('pointerenter', handler);
    tab.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      hoveredTab = activeTab;
      renderTab(activeTab);
    });
  });
  tabsEl.addEventListener('mouseleave', () => {
    if (hoveredTab !== activeTab) {
      hoveredTab = activeTab;
      renderTab(activeTab);
      flashCard();
    }
  });

  runBtn.addEventListener('click', () => {
    if (runBtn.disabled) return;
    runBtn.disabled = true;
    runLabel.textContent = 'Running\u2026';
    preview.innerHTML = '<div class="spinner"></div>';
    setTimeout(() => {
      runBtn.disabled = false;
      runLabel.textContent = 'Run';
      renderTab(activeTab);
      showToast('Generation complete');
    }, 1400);
  });

  copyBtn.addEventListener('click', async () => {
    try { await navigator.clipboard.writeText(promptInput.value); }
    catch (e) { promptInput.select(); document.execCommand('copy'); }
    copyBtn.classList.add('copied');
    copyLabel.textContent = 'Copied';
    showToast('Copied to clipboard');
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyLabel.textContent = 'Copy';
    }, 1600);
  });

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      runBtn.click();
    }
  });
</script>
</body>
</html>
